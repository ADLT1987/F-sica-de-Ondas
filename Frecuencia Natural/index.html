<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Frecuencia Angular</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="calculator-container">
        <h2>Frecuencia Angular (&omega;)</h2>
        
        <div class="input-group">
            <label for="stiffness">Constante de rigidez (k) [N/m]:</label>
            <input type="number" id="stiffness" placeholder="Ej. 500" min="0" step="any">
        </div>
        
        <div class="input-group">
            <label for="mass">Masa del sistema (m) [kg]:</label>
            <input type="number" id="mass" placeholder="Ej. 2.5" min="0.001" step="any">
        </div>
        
        <button onclick="calculateFrequency()">Calcular</button>
        
        <div class="result" id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
