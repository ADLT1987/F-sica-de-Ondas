<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora NPS</title>
    <link rel="stylesheet" href="styles.css"
</head>
<body>
    
    <div class="contenedor">
        <h1>Calculadora de Nivel de Preisón Sonora</h1>

        <label for="presion">
            Presión Sonora PA
        </label>

        <input
            type="number"
            id="presión"
            placeholder="Ejemplo: 0.02"
            step="any"
        >

        <button id="btnCalcular">
            Calcular
        </button>

        <div id="resultado"></div>
    </div>

    <script src="script.js"
</body>
</html>
